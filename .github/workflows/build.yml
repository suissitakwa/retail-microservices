name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Compile-check every service ───────────────────────────────────────────
  compile:
    name: Compile ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery
          - customer-service
          - payment-service
          - product-service
          - order-service
          - notification-service
          - copilot-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: ./mvnw compile -q

  # ── Unit tests (slice tests — no Docker, no DB) ────────────────────────────
  unit-tests:
    name: Unit tests — notification-service
    runs-on: ubuntu-latest
    needs: compile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: services/notification-service
        run: ./mvnw test -Dtest="NotificationControllerTest,NotificationServiceTest"
