name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Compile-check every service ───────────────────────────────────────────
  compile:
    name: Compile ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery
          - customer-service
          - payment-service
          - product-service
          - order-service
          - notification-service
          - copilot-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: ./mvnw compile -q

  # ── Unit tests (pure unit tests — no Docker, no DB) ───────────────────────
  unit-tests:
    name: Unit tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: compile

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: notification-service
            tests: "NotificationControllerTest,NotificationServiceTest"
          - service: product-service
            tests: "ProductServiceTest,InventoryServiceTest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        run: ./mvnw test -Dtest="${{ matrix.tests }}"
