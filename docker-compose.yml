version: '3.8'

services:
  # ----------------------------------------
  # Zookeeper
  # ----------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ----------------------------------------
  # Kafka
  # ----------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 40000
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ----------------------------------------
  # Config Server (startup order: 1st)
  # ----------------------------------------
  config-server:
    build: ./services/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Discovery / Eureka (startup order: 2nd)
  # ----------------------------------------
  discovery:
    build: ./services/discovery
    container_name: discovery
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888

  # ----------------------------------------
  # Customer Database
  # ----------------------------------------
  customer-db:
    image: postgres:14-alpine
    container_name: customer-postgres-db
    environment:
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_password
      POSTGRES_DB: customer_db
    ports:
      - "5435:5432"
    volumes:
      - customer_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Customer Service
  # ----------------------------------------
  customer-service:
    build: ./services/customer-service
    container_name: customer-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      customer-db:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://customer-db:5432/customer_db
      SPRING_DATASOURCE_USERNAME: customer_user
      SPRING_DATASOURCE_PASSWORD: customer_password
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EUREKA_HOST: discovery
      SERVER_PORT: 8083

  # ----------------------------------------
  # Product Database
  # ----------------------------------------
  product-db:
    image: postgres:14-alpine
    container_name: product-postgres-db
    environment:
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
      POSTGRES_DB: product_db
    ports:
      - "5436:5432"
    volumes:
      - product_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Product Service
  # ----------------------------------------
  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      product-db:
        condition: service_started
      redis:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/product_db
      SPRING_DATASOURCE_USERNAME: product_user
      SPRING_DATASOURCE_PASSWORD: product_password
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EUREKA_HOST: discovery
      SERVER_PORT: 8084

  # ----------------------------------------
  # Order Database
  # ----------------------------------------
  order-db:
    image: postgres:14-alpine
    container_name: order-postgres-db
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
      POSTGRES_DB: order_db
    ports:
      - "5437:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Order Service
  # ----------------------------------------
  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      order-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: order_user
      SPRING_DATASOURCE_PASSWORD: order_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost:3000}
      PRODUCT_SERVICE_URL: http://product-service:8084
      EUREKA_HOST: discovery
      SERVER_PORT: 8085

  # ----------------------------------------
  # Notification Database
  # ----------------------------------------
  notification-db:
    image: postgres:14-alpine
    container_name: notification-postgres-db
    environment:
      POSTGRES_USER: notif_user
      POSTGRES_PASSWORD: notif_password
      POSTGRES_DB: notification_db
    ports:
      - "5438:5432"
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Notification Service
  # ----------------------------------------
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      config-server:
        condition: service_healthy
      notification-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: notif_user
      SPRING_DATASOURCE_PASSWORD: notif_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EUREKA_HOST: discovery
      SERVER_PORT: 8086

  # ----------------------------------------
  # Copilot Service (no database)
  # ----------------------------------------
  copilot-service:
    build: ./services/copilot-service
    container_name: copilot-service
    ports:
      - "8087:8087"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ORDER_SERVICE_URL: http://order-service:8085
      EUREKA_HOST: discovery
      SERVER_PORT: 8087

  # ----------------------------------------
  # Payment Database
  # ----------------------------------------
  payment-db:
    image: postgres:14-alpine
    container_name: payment-postgres-db
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Payment Service (startup order: 3rd)
  # ----------------------------------------
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      payment-db:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: discovery
      SERVER_PORT: 8082

  # ----------------------------------------
  # Retail Database
  # ----------------------------------------
  retail-db:
    image: postgres:14-alpine
    container_name: retail-postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: retail_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Redis
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  # ----------------------------------------
  # Retail Monolith (startup order: last)
  # ----------------------------------------
  retail-app:
    build: ../retail
    container_name: retail-spring-app
    ports:
      - "8080:8080"
    depends_on:
      - retail-db
      - kafka
      - redis
      - payment-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_USERNAME: user
      DB_PASSWORD: password
      FLYWAY_URL: jdbc:postgresql://retail-db:5432/retail_db
      SPRING_DATASOURCE_URL: jdbc:postgresql://retail-db:5432/retail_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CACHE_TYPE: redis
      PAYMENT_SERVICE_URL: http://payment-service:8082

  # ----------------------------------------
  # Monitoring
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - retail-app
      - payment-service

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  payment_postgres_data:
  customer_postgres_data:
  product_postgres_data:
  order_postgres_data:
  notification_postgres_data:
  kafka_data:
  redis_data:
