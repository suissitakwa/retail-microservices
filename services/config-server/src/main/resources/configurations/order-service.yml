server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5437/order_db
    username: ${DB_USERNAME:order_user}
    password: ${DB_PASSWORD:order_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}

product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8084}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
