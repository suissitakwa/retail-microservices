server:
  port: 8087

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:default-secret-key-for-dev-only-change-in-prod}

openai:
  api-key: ${OPENAI_API_KEY:}

order-service:
  url: ${ORDER_SERVICE_URL:http://localhost:8085}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
