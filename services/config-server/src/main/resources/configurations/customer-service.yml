server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/customer_db
    username: ${DB_USERNAME:customer_user}
    password: ${DB_PASSWORD:customer_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:default-secret-key-for-dev-only-change-in-prod}
      expiration: 86400000        # 24 h
      refresh-expiration: 604800000 # 7 d

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
