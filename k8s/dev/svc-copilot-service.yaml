apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-service
  namespace: retail-microservices-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: copilot-service
  template:
    metadata:
      labels:
        app: copilot-service
    spec:
      containers:
        - name: copilot-service
          image: suissitakwa/retail-ms-copilot-service:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-server:8888"
            - name: EUREKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: retail-ms-config
                  key: EUREKA_HOST
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-ms-secrets
                  key: JWT_SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-ms-secrets
                  key: OPENAI_API_KEY
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: retail-ms-config
                  key: ORDER_SERVICE_URL
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "300m"

---
apiVersion: v1
kind: Service
metadata:
  name: copilot-service
  namespace: retail-microservices-dev
spec:
  selector:
    app: copilot-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
